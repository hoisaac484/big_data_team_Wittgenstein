name: Tests & Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: team_wittgenstein/coursework_one

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-root

      - name: Lint with flake8
        run: poetry run flake8 modules/ tests/

      - name: Check import order with isort
        run: poetry run isort --check-only --diff modules/ tests/

      - name: Check formatting with black
        run: poetry run black --check modules/ tests/

      - name: Run tests with coverage
        run: poetry run pytest --cov=modules --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: team_wittgenstein/coursework_one/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: team_wittgenstein
          fail_ci_if_error: false

  test-cw2:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: team_wittgenstein/coursework_two

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-root

      - name: Lint with flake8
        run: poetry run flake8 modules/ tests/

      - name: Check import order with isort
        run: poetry run isort --check-only --diff modules/ tests/

      - name: Check formatting with black
        run: poetry run black --check modules/ tests/

      - name: Run tests with coverage
        run: poetry run pytest --cov=modules --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: team_wittgenstein/coursework_two/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: team_wittgenstein
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-root

      - name: Scan code with Bandit
        run: poetry run bandit -c pyproject.toml -r modules/ main.py

      - name: Upgrade pip inside poetry env to fix CVE-2026-3219
        run: poetry run pip install --upgrade pip

      - name: Audit dependencies with pip-audit
        run: poetry run pip-audit
