postgres:
  host: "localhost"
  port: 5439
  database: "fift"
  user: "postgres"
  password: "postgres"

mongo:
  host: "localhost"
  port: 27019

minio:
  host: "localhost:9000"
  access_key: "ift_bigdata"
  secret_key: "minio_password"
  secure: false

data:
  price_period: "5y"
  fundamentals_period: "5y"
  fundamentals_source: "waterfall" # options: waterfall (EDGAR→SimFin→yfinance→ffill), simfin
  cache_ttl_days: 7  # Re-fetch cached data older than this many days (remove to disable)

# US-only strategy: only fetch data for US-listed companies
country_filter: "US"

# Symbols to exclude from the pipeline (delisted, renamed, or broken tickers)
exclude_symbols:
  # Acquired / merged — no longer trading
  - ATVI   # Activision → acquired by Microsoft
  - ABMD   # Abiomed → acquired by J&J
  - AGN    # Allergan → acquired by AbbVie
  - ALXN   # Alexion → acquired by AstraZeneca
  - CELG   # Celgene → acquired by Bristol-Myers Squibb
  # Renamed — old ticker no longer resolves
  - ANTM   # → ELV (Elevance Health)
  - ADS    # → BFH (Bread Financial)
  - ABC    # → COR (Cencora)
  - COG    # → CTRA (Coterra Energy)
  - ARNC   # → HWM (Howmet Aerospace)
  - CBS    # → PARA (Paramount)
  - BHGE   # → BKR (Baker Hughes)
  - APC    # → OXY (Occidental Petroleum)
  # Renamed ticker (symbol change)
  - BLL    # → BALL (Ball Corp, renamed May 2022)
  - XEC    # Cimarex → merged into CTRA (Coterra Energy)
  - CTL    # CenturyLink → renamed LUMN (Lumen Technologies)
  - CERN   # Cerner → acquired by Oracle
  - ANSS   # ANSYS — delisted/unresolvable on yfinance

validation:
  min_price_rows: 200
  min_years: 4
  max_null_pct: 0.5
  strict: true

# Scheduler: cron times for each recurring task (all times UTC)
scheduler:
  prices_and_rates:      # runs monthly
    day: 1
    hour: 2
    minute: 0
  fundamentals:          # runs quarterly
    month: "1,4,7,10"
    day: 1
    hour: 4
    minute: 0

# Dev mode: limit symbols to avoid hitting API rate limits during development.
# Set enabled: false for a full production run.
dev:
  enabled: true
  max_symbols: 3
