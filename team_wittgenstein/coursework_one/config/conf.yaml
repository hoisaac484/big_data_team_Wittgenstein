postgres:
  host: "localhost"
  port: 5439
  database: "fift"
  user: "postgres"
  password: "postgres"

mongo:
  host: "localhost"
  port: 27019

minio:
  host: "localhost:9000"
  access_key: "ift_bigdata"
  secret_key: "minio_password"
  secure: false

data:
  price_period: "5y"
  fundamentals_period: "5y"
  fundamentals_source: "simfin" # options: simfin, alphavantage

validation:
  min_price_rows: 200
  min_years: 4
  max_null_pct: 0.5
  strict: true

# Dev mode: limit symbols to avoid hitting API rate limits during development.
# Set enabled: false for a full production run.
dev:
  enabled: true
  max_symbols: 10
